<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }

:root {
  --bg: #E2DDD6;
  --surface: #D6D0C8;
  --border: #B8B2AA;
  --text: #1A1A1A;
  --text2: #8A8480;
  --accent: #3D6B9E;
  --accent-red: #C4492A;
  --income: #3D6B9E;
  --expense: #C4492A;
  --transfer: #8A8480;
  --font: 'Space Mono', 'Courier New', monospace;
  --sidebar-w: 400px;
  --card-amex: #3D6B9E;
  --card-apple: #5B8C5A;
  --card-chase: #B8860B;
}

html, body {
  background: var(--bg);
  background-image: radial-gradient(circle, rgba(184,178,170,0.3) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: 10px 10px;
  color: var(--text);
  font-family: var(--font);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* dot grid is already faint via rgba — no overlay needed */

/* Decorative crosshair SVG — removed */

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: none;
  margin: 0;
  margin-right: 0;
  transition: margin-right 0.2s ease-out;
  padding: 20px 32px 12px;
  position: relative;
  z-index: 1;
}

body.settings-open #app { margin-right: var(--sidebar-w); }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; padding: 0 0 16px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text2); font-size: 11px; font-weight: 700; font-family: var(--font);
  padding: 8px 20px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  letter-spacing: 0.2em; text-transform: uppercase;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent-red); }

.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

/* Calendar header */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
}

.cal-header h1 {
  font-size: 28px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase;
}

.cal-nav { display: flex; gap: 12px; align-items: center; }

.cal-nav button {
  background: none; border: none; color: var(--accent); font-size: 11px;
  cursor: pointer; font-family: var(--font); font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 4px 0; transition: color 0.15s;
}
.cal-nav button:hover { color: var(--text); }
.cal-nav .today-btn { color: var(--accent-red); }
.cal-nav .today-btn:hover { color: var(--text); }
.cal-nav .arrow-btn { font-size: 18px; letter-spacing: 0; padding: 0 4px; }

/* Day-of-week row */
.dow-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding-bottom: 8px; }
.dow-row span {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.2em;
}

.cal-grid-wrap { flex: 1; position: relative; overflow: hidden; }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr);
  height: 100%; transition: opacity 0.15s ease;
}
.cal-grid.fade-out { opacity: 0; }

/* Day cells */
.day-cell {
  padding: 4px 6px; min-height: 0; overflow: hidden;
  display: flex; flex-direction: column;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.day-cell:nth-child(7n) { border-right: none; }

.day-num {
  font-size: 12px; font-weight: 700; color: var(--text2);
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px; flex-shrink: 0;
  letter-spacing: 0.05em;
}
/* Today: thin reticle circle */
.day-cell.today .day-num {
  border: 1.5px solid var(--accent-red);
  border-radius: 50%;
  color: var(--accent-red);
  font-weight: 700;
}
.day-cell.other-month .day-num { color: #C4BFB8; }
.day-cell.other-month .day-balance { color: #C4BFB8; }
.day-cell.other-month .day-savings { color: #C4BFB8; }
.day-cell.other-month .day-events .event-pill { opacity: 0.4; }

.day-balance { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; flex-shrink: 0; }
.day-balance.negative { color: var(--accent-red); }

.day-savings { font-size: 12px; color: var(--accent); font-weight: 400; flex-shrink: 0; letter-spacing: 0.02em; }
.day-savings.negative { color: var(--accent-red); }

.day-events { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; overflow: hidden; flex: 1; min-height: 0; }

/* Events: subtle tinted pills */
.event-pill {
  font-size: 9px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 0; line-height: 1; letter-spacing: 0.04em;
  padding: 2px 5px; border-left: 2px solid;
}
.pill-income { background: rgba(61,107,158,0.1); border-left-color: var(--income); color: var(--income); }
.pill-expense { background: rgba(196,73,42,0.1); border-left-color: var(--accent-red); color: var(--accent-red); }
.pill-transfer { background: rgba(138,132,128,0.1); border-left-color: var(--text2); color: var(--text2); }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; right: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border); z-index: 100;
  transform: translateX(100%); transition: transform 0.2s ease-out;
  display: flex; flex-direction: column;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-header h2 {
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
}

.sidebar-close {
  background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer;
  padding: 0; transition: color 0.15s; font-family: var(--font);
}
.sidebar-close:hover { color: var(--text); }

.sidebar-scroll { overflow-y: auto; padding: 20px 24px 40px; flex: 1; }

.s-section { margin-bottom: 36px; }
.s-section h3 {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.s-section h3::before { content: '// '; }

.s-field {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; gap: 12px;
}
.s-field label {
  font-size: 11px; color: var(--text2); flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 400;
}

.s-field input[type="number" inputmode="decimal"],
.s-field input[type="date"],
.s-field input[type="text"] {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 4px 0; font-family: var(--font);
  outline: none; text-align: right; width: 130px; transition: border-color 0.15s;
}
.s-field input:focus { border-bottom-color: var(--accent); }
.s-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); }
.s-field input::placeholder { color: var(--text2); text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }

.s-field select {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 4px 0; font-family: var(--font);
  outline: none; cursor: pointer; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.s-field select:focus { border-bottom-color: var(--accent); }

/* Toggle: text-based cycling */
.toggle-text {
  font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.15em; font-family: var(--font);
  background: none; border: none; padding: 4px 0; transition: color 0.15s;
}
.toggle-text:hover { color: var(--text); }

/* Statement tiles */
.stmt-item {
  padding: 10px 12px; margin-bottom: 6px; position: relative;
  cursor: pointer; transition: background 0.15s;
  background: rgba(0,0,0,0.04);
  border-left: 2px solid var(--accent-red);
}
.stmt-item:hover { background: rgba(0,0,0,0.07); }
.stmt-item.stmt-hidden {
  opacity: 0.4; border-left-color: var(--border);
}
.stmt-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.stmt-card { font-size: 12px; font-weight: 700; color: var(--text); flex: 1; text-transform: uppercase; letter-spacing: 0.08em; }
.stmt-amount { font-size: 12px; font-weight: 700; color: var(--accent-red); flex-shrink: 0; }
.stmt-actions { display: flex; gap: 4px; flex-shrink: 0; }
.stmt-action-btn {
  background: none; border: none; color: var(--text2); font-size: 10px;
  cursor: pointer; padding: 0 2px; opacity: 0.5; transition: opacity 0.15s;
  font-family: var(--font); text-transform: uppercase; letter-spacing: 0.08em;
}
.stmt-action-btn:hover { opacity: 1; }
.stmt-meta { font-size: 10px; color: var(--text2); line-height: 1.5; letter-spacing: 0.05em; text-transform: uppercase; }
.stmt-edit {
  margin-top: 8px; padding-top: 8px;
}
.stmt-edit .s-field { padding: 6px 0; }
.stmt-edit .s-field label { font-size: 10px; }
.stmt-edit .s-field input { width: 120px; font-size: 12px; }
.stmt-edit .s-field select { font-size: 12px; }
.show-hidden-btn {
  background: none; border: none; color: var(--text2); font-size: 10px; font-weight: 700;
  cursor: pointer; font-family: var(--font); text-transform: uppercase; letter-spacing: 0.15em;
  padding: 8px 0; transition: color 0.15s; margin-top: 4px;
}
.show-hidden-btn:hover { color: var(--text); }

/* Transactions */
.tx-item {
  padding: 10px 12px; margin-bottom: 6px; position: relative;
  cursor: pointer; transition: background 0.15s;
  background: rgba(0,0,0,0.04);
  border-left: 2px solid var(--border);
}
.tx-item:hover { background: rgba(0,0,0,0.07); }

.tx-edit {
  margin-top: 8px; padding-top: 8px;
}
.tx-edit .s-field { padding: 6px 0; }
.tx-edit .s-field label { font-size: 10px; }
.tx-edit .s-field input { width: 120px; font-size: 12px; }
.tx-edit .s-field select { font-size: 12px; }

.tx-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.tx-label { font-size: 12px; font-weight: 700; color: var(--text); flex: 1; text-transform: uppercase; letter-spacing: 0.08em; }
.tx-amount { font-size: 12px; font-weight: 700; flex-shrink: 0; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }
.tx-amount.transfer { color: var(--text2); }
.tx-del {
  background: none; border: none; color: var(--text2); font-size: 14px;
  cursor: pointer; padding: 0 2px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s;
  font-family: var(--font);
}
.tx-del:hover { opacity: 1; }
.tx-meta { font-size: 10px; color: var(--text2); line-height: 1.5; letter-spacing: 0.05em; text-transform: uppercase; }

.tx-add-form {
  padding: 12px 0; margin-top: 8px; border-top: 1px solid var(--border);
}
.tx-add-form .s-field { padding: 6px 0; }
.tx-add-form .s-field label { font-size: 10px; }
.tx-add-form .s-field input { width: 120px; font-size: 12px; }
.tx-add-form .s-field select { font-size: 12px; }

.tx-recurrence-fields { margin-top: 4px; }

/* Text-only button */
.add-btn {
  background: none; border: none; color: var(--accent); font-size: 11px; font-weight: 700;
  padding: 8px 0; cursor: pointer; font-family: var(--font);
  margin-top: 8px; width: 100%; text-align: left;
  text-transform: uppercase; letter-spacing: 0.15em;
  transition: color 0.15s;
}
.add-btn:hover { color: var(--text); }

.seed-warning { font-size: 10px; color: var(--accent-red); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
.seed-info { font-size: 10px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

/* Lock screen */
.lock-screen {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: var(--bg);
  background-image: radial-gradient(circle, rgba(184,178,170,0.3) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: 10px 10px;
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.lock-screen.hidden { display: none; }
.lock-label {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 16px;
}
.lock-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 16px; padding: 8px 0; font-family: var(--font);
  outline: none; text-align: center; width: 200px; transition: border-color 0.15s;
  letter-spacing: 0.1em;
}
.lock-input:focus { border-bottom-color: var(--accent); }
.lock-input::placeholder { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; }
.lock-error {
  font-size: 10px; color: var(--accent-red); text-transform: uppercase;
  letter-spacing: 0.1em; margin-top: 12px; height: 14px;
}

/* Gear button */
.gear-btn {
  position: fixed; bottom: 20px; right: 20px; width: auto; height: auto;
  background: none; border: none; color: var(--text2); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: color 0.15s, opacity 0.2s;
  font-family: var(--font); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.15em; padding: 8px;
}
.gear-btn:hover { color: var(--text); }
body.settings-open .gear-btn { opacity: 0; pointer-events: none; }

/* Growth Calculator */
.growth-wrap {
  flex: 1; display: flex; flex-direction: column; padding: 24px 0 16px; overflow: hidden;
}
.growth-inputs {
  display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; flex-shrink: 0;
}
.growth-field {
  display: flex; flex-direction: column; gap: 6px;
}
.growth-field label {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
}
.growth-field input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 6px 0; font-family: var(--font);
  outline: none; width: 150px; transition: border-color 0.15s;
}
.growth-field input:focus { border-bottom-color: var(--accent); }
.growth-field input::placeholder { color: var(--text2); font-size: 12px; }

.growth-body {
  display: flex; gap: 24px; flex: 1; min-height: 0;
}
.growth-chart-wrap {
  background: var(--surface); padding: 20px;
  border: 1px solid var(--border); flex: 1; min-width: 0; position: relative;
  display: flex; flex-direction: column;
}
.growth-chart-wrap canvas { width: 100%; flex: 1; cursor: crosshair; }

.growth-tooltip {
  position: absolute; pointer-events: none; background: var(--surface);
  border: 1px solid var(--border); padding: 10px 14px;
  font-size: 11px; color: var(--text); white-space: nowrap;
  opacity: 0; transition: opacity 0.12s;
  z-index: 10; letter-spacing: 0.05em;
}
.growth-tooltip.visible { opacity: 1; }
.growth-tooltip .tt-year { font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
.growth-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
.growth-tooltip .tt-label { color: var(--text2); text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; }
.growth-tooltip .tt-val { font-weight: 700; }
.growth-tooltip .tt-val.contrib { color: var(--accent); }
.growth-tooltip .tt-val.interest { color: #4A7A3A; }
.growth-tooltip .tt-val.total { color: var(--text); }

.growth-table-wrap {
  width: 340px; flex-shrink: 0; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--border);
}
.growth-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.growth-table th {
  text-align: left; font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em; padding: 10px 10px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: var(--surface);
}
.growth-table td {
  padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.growth-table tr:hover td { background: rgba(0,0,0,0.03); }
.growth-table .col-year { color: var(--text); font-weight: 700; }
.growth-table .col-interest { color: #4A7A3A; }
.growth-table .col-total { color: var(--text); font-weight: 700; }
.growth-table .col-principal { color: var(--accent); }
.growth-table tr.interest-flip td { background: rgba(74,122,58,0.08); }

/* Log tab — quick-input */
.log-wrap {
  flex: 1; display: flex; flex-direction: column; padding: 24px 16px 16px;
  overflow-y: auto; max-width: 480px;
}
.log-heading {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 24px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.log-heading::before { content: '// '; }
.log-field {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px;
}
.log-field label {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
}
.log-field input,
.log-field select {
  background: transparent; border: none; border-bottom: 2px solid var(--border);
  color: var(--text); font-size: 20px; padding: 12px 0; font-family: var(--font);
  outline: none; transition: border-color 0.15s; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.log-field input:focus,
.log-field select:focus { border-bottom-color: var(--accent); }
.log-field input::placeholder { color: var(--text2); font-size: 16px; text-transform: uppercase; letter-spacing: 0.1em; }
.log-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); width: 24px; height: 24px; }
.log-field select { cursor: pointer; }
.cat-new-input::placeholder {
  color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px;
}
.card-toggle-wrap { display: flex; gap: 6px; }
.card-toggle-btn {
  flex: 1;
  padding: 6px 0;
  font-family: var(--font);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.card-toggle-btn.active[data-card="Amex"] { background: var(--card-amex); color: #fff; border-color: var(--card-amex); }
.card-toggle-btn.active[data-card="Apple"] { background: var(--card-apple); color: #fff; border-color: var(--card-apple); }
.card-toggle-btn.active[data-card="Chase"] { background: var(--card-chase); color: #fff; border-color: var(--card-chase); }

.card-pill {
  display: inline-block;
  padding: 1px 5px;
  font-family: var(--font);
  font-size: 7px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #fff;
  border-radius: 2px;
  margin-left: 6px;
  vertical-align: middle;
}
.card-pill[data-card="Amex"] { background: var(--card-amex); }
.card-pill[data-card="Apple"] { background: var(--card-apple); }
.card-pill[data-card="Chase"] { background: var(--card-chase); }

.card-filter-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.card-filter-btn {
  flex: 1;
  padding: 5px 0;
  font-family: var(--font);
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.card-filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.card-filter-btn.active[data-card="Amex"] { background: var(--card-amex); color: #fff; border-color: var(--card-amex); }
.card-filter-btn.active[data-card="Apple"] { background: var(--card-apple); color: #fff; border-color: var(--card-apple); }
.card-filter-btn.active[data-card="Chase"] { background: var(--card-chase); color: #fff; border-color: var(--card-chase); }

.log-submit {
  background: none; border: 2px solid var(--accent); color: var(--accent);
  font-size: 13px; font-weight: 700; padding: 14px 0; cursor: pointer;
  font-family: var(--font); text-transform: uppercase; letter-spacing: 0.2em;
  transition: background 0.15s, color 0.15s; width: 100%; margin-top: 8px;
}
.log-submit:hover { background: var(--accent); color: #fff; }
.log-submit:active { background: var(--accent); color: #fff; }

.log-confirm {
  font-size: 11px; color: #4A7A3A; text-transform: uppercase;

.expenses-wrap {

}
.expenses-header {

}
.exp-nav { display: flex; gap: 12px; align-items: center; }
.exp-nav button {

}

.exp-budget-section {

}
.exp-budget-label {

}
.exp-budget-label::before { content: '// '; }
.exp-budget-row {
  display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
}
.exp-budget-field {
  display: flex; flex-direction: column; gap: 2px;
}
.exp-budget-field label {
  font-size: 9px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.exp-budget-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 4px 0; font-family: var(--font);
  outline: none; width: 100px; transition: border-color 0.15s;
}
.exp-budget-input:focus { border-bottom-color: var(--accent); }
.exp-budget-cats {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.exp-budget-cat-field {
  display: flex; flex-direction: column; gap: 2px;
}
.exp-budget-cat-field label {
  font-size: 9px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.exp-budget-cat-field input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 4px 0; font-family: var(--font);

}
.exp-budget-cat-field input:focus { border-bottom-color: var(--accent); }

.exp-col-budget {
  display: flex; justify-content: space-between; gap: 8px;
  font-size: 10px; padding: 4px 0 8px; letter-spacing: 0.05em; text-transform: uppercase;
}
.exp-col-budget-item { display: flex; flex-direction: column; gap: 1px; }
.exp-col-budget-lbl { font-size: 8px; color: var(--text2); letter-spacing: 0.1em; }
.exp-col-budget-val { font-weight: 700; color: var(--text); }
.exp-col-budget-val.negative { color: var(--accent-red); }
.exp-col-budget-val.positive { color: #4A7A3A; }

.exp-form {
  display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
  flex-shrink: 0; margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.exp-form-field {
  display: flex; flex-direction: column; gap: 4px;
}
.exp-form-field label {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
}
.exp-form-field input,
.exp-form-field select {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 6px 0; font-family: var(--font);
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.exp-form-field input { width: 140px; }
.exp-form-field select { width: 140px; cursor: pointer; }
.exp-form-field input:focus,
.exp-form-field select:focus { border-bottom-color: var(--accent); }
.exp-form-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4); }

.exp-add-btn {
  background: none; border: none; color: var(--accent); font-size: 11px; font-weight: 700;
  padding: 6px 0; cursor: pointer; font-family: var(--font);
  text-transform: uppercase; letter-spacing: 0.15em; transition: color 0.15s;
}
.exp-add-btn:hover { color: var(--text); }

.exp-summary {
  display: flex; gap: 24px; flex-shrink: 0; margin-bottom: 16px;
}
.exp-summary-item {
  display: flex; flex-direction: column; gap: 2px; flex: 1;
}
.exp-summary-label {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
}
.exp-summary-value {
  font-size: 22px; font-weight: 700; color: var(--text);
}
.exp-summary-value.positive { color: #4A7A3A; }
.exp-summary-value.negative { color: var(--accent-red); }

.exp-columns {
  display: flex; gap: 24px; flex: 1; min-height: 0; align-items: stretch;
}
.exp-column {
  flex: 1; min-width: 160px; max-width: 280px;
  display: flex; flex-direction: column;
}
.exp-col-items {
  flex: 1; overflow-y: auto; min-height: 0;
}
.exp-col-header {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.cat-edit-row {
  display: flex; align-items: center; gap: 6px;
  padding: 0; margin: 0;
}
.cat-rename-input {
  flex: 1; min-width: 0;
  background: transparent; border: none; border-bottom: 2px solid var(--accent);
  color: var(--text); font-family: var(--font); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 4px 0; outline: none;
}
.cat-edit-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--font); font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent); padding: 4px 6px;
}
.cat-edit-btn:hover { color: var(--text); }
.cat-del-btn { color: var(--accent-red); }
.cat-del-btn:hover { color: var(--text); }
.exp-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid rgba(184,178,170,0.3);
}
.exp-item-info { flex: 1; min-width: 0; }
.exp-item-name {
  font-size: 11px; font-weight: 700; color: var(--text);
  text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.exp-item-date {
  font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em;
}
.exp-item-amount {
  font-size: 12px; font-weight: 700; color: var(--accent-red); flex-shrink: 0;
}
.exp-item-actions {
  display: flex; gap: 2px; flex-shrink: 0;
}
.exp-item-btn {
  background: none; border: none; color: var(--text2); font-size: 14px;
  cursor: pointer; padding: 2px 4px; opacity: 0.6; transition: opacity 0.15s, color 0.15s;
  font-family: var(--font);
}
.exp-item-btn:hover { opacity: 1; color: var(--accent-red); }
.exp-col-total {
  font-size: 12px; font-weight: 700; color: var(--text);
  padding-top: 8px; margin-top: 4px; border-top: 1px solid var(--border);
  text-align: right;
}

/* Expense edit modal */
.exp-edit-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.3); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.exp-edit-modal {
  background: var(--surface); border: 1px solid var(--border);
  padding: 24px; width: 320px;
}
.exp-edit-modal h3 {
  font-size: 10px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.15em;
  margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.exp-edit-modal h3::before { content: '// '; }
.exp-edit-modal .s-field {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; gap: 12px;
}
.exp-edit-modal .s-field label {
  font-size: 11px; color: var(--text2); text-transform: uppercase;
  letter-spacing: 0.1em; font-weight: 400; flex-shrink: 0;
}
.exp-edit-modal .s-field input,
.exp-edit-modal .s-field select {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 4px 0; font-family: var(--font);
  outline: none; text-align: right; width: 150px; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.exp-edit-modal .s-field input:focus,
.exp-edit-modal .s-field select:focus { border-bottom-color: var(--accent); }
.exp-edit-actions {
  display: flex; gap: 16px; margin-top: 16px; justify-content: flex-end;
}
.exp-edit-actions button {
  background: none; border: none; font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: var(--font); text-transform: uppercase;
  letter-spacing: 0.15em; padding: 6px 0; transition: color 0.15s;
}
.exp-edit-cancel { color: var(--text2); }
.exp-edit-cancel:hover { color: var(--text); }
.exp-edit-save { color: var(--accent); }
.exp-edit-save:hover { color: var(--text); }

/* ===== Mobile ===== */
@media (max-width: 768px) {
  html, body { height: 100%; overflow: hidden; }

  #app { padding: 8px 0 0; height: 100vh; display: flex; flex-direction: column; }
  body.settings-open #app { margin-right: 0; }

  /* Tabs */
  .tab-bar { padding: 0 0 6px; margin: 0 8px; }
  .tab-btn { font-size: 9px; padding: 5px 12px; letter-spacing: 0.15em; }

  /* Calendar header — single line, compact */
  .cal-header { padding: 6px 8px 4px; }
  .cal-header h1 { font-size: 15px; letter-spacing: 0.1em; white-space: nowrap; }
  .cal-nav button { font-size: 10px; }
  .cal-nav .arrow-btn { font-size: 16px; }
  .cal-nav { gap: 8px; }

  /* Day-of-week row — hidden on mobile (each month section has its own) */
  .dow-row { display: none; }

  /* Grid wrap — scroll-snap container */
  .cal-grid-wrap {
    flex: 1; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: y mandatory;
  }

  .month-section {
    scroll-snap-align: start;
    height: 100%;
    display: flex; flex-direction: column;
  }

  .month-section .month-label {
    font-size: 10px; font-weight: 700;
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.15em;
    padding: 4px 8px 2px; flex-shrink: 0;
  }

  .month-section .section-dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding-bottom: 2px;
  }
  .month-section .section-dow-row span {
    font-size: 8px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  .month-section .cal-grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    height: auto;
  }

  /* Day cells — compact, clip overflow */
  .day-cell { padding: 2px 3px 3px; min-height: 0; overflow: hidden; }
  .day-num { font-size: 9px; width: 16px; height: 16px; margin-bottom: 0; }
  .day-cell.today .day-num { border-width: 1px; }

  /* Balance numbers — small enough to never truncate */
  .day-balance { font-size: 11px; line-height: 1.1; white-space: nowrap; }
  .day-savings { font-size: 8px; line-height: 1.1; }

  /* Event pills — wrap text, no truncation */
  .day-events { gap: 1px; margin-top: 1px; overflow: visible; }
  .event-pill {
    font-size: 7px; line-height: 1.2;
    padding: 1px 3px; border-left-width: 2px;
    white-space: normal; overflow: visible; text-overflow: unset;
    word-break: break-word;
  }

  /* Settings button — fixed bottom-right, above content */
  .gear-btn {
    position: fixed; bottom: 12px; right: 12px;
    font-size: 9px; letter-spacing: 0.1em;
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 10px; z-index: 50;
  }

  /* Sidebar — full-width overlay on mobile */
  .sidebar { width: 100vw; }
  .sidebar-scroll { padding: 16px 16px 32px; }
  .s-field label { font-size: 10px; }
  .s-field input[type="number" inputmode="decimal"],
  .s-field input[type="date"],
  .s-field input[type="text"] { font-size: 12px; width: 110px; }
  .s-field select { font-size: 12px; }

  /* Growth tab */
  .growth-wrap { padding: 12px 8px 8px; }
  .growth-inputs { gap: 12px; justify-content: center; }
  .growth-field label { font-size: 9px; }
  .growth-field input { font-size: 12px; width: 120px; }
  .growth-body { flex-direction: column; }
  .growth-chart-wrap { min-height: 200px; padding: 12px 8px; }
  .growth-table-wrap { width: 100%; max-height: 240px; }
  .growth-table { font-size: 10px; }
  .growth-table th { font-size: 9px; padding: 6px 6px; }
  .growth-table td { padding: 4px 6px; }

  /* Log tab */
  .log-wrap { padding: 16px 16px 24px; max-width: none; }
  .log-field input,
  .log-field select { font-size: 18px; padding: 10px 0; }
  .log-field input::placeholder { font-size: 14px; }
  .log-submit { padding: 16px 0; font-size: 12px; }

  /* Expenses tab */
  .expenses-wrap { padding: 8px 10px 8px; }
  .expenses-header { padding: 0 0 6px; }
  .expenses-header h1 { font-size: 15px; letter-spacing: 0.1em; }
  .exp-nav button { font-size: 10px; }
  .exp-nav .arrow-btn { font-size: 16px; }
  .exp-budget-section { margin-bottom: 10px; padding-bottom: 10px; }
  .exp-budget-label { font-size: 9px; margin-bottom: 4px; }
  .exp-budget-input { font-size: 14px; width: 140px; }
  .exp-budget-row { gap: 12px; }
  .exp-budget-cats { gap: 10px; }
  .exp-budget-cat-field input { width: 60px; font-size: 12px; }
  .exp-budget-cat-field label { font-size: 8px; }
  .exp-summary { gap: 16px; margin-bottom: 12px; }
  .exp-summary-label { font-size: 8px; }
  .exp-summary-value { font-size: 20px; }
  .exp-columns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    overflow-y: auto; flex-direction: unset;
  }
  .exp-cat-tile {
    display: flex; flex-direction: column;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 0;
  }
  .exp-cat-tile-top {
    display: flex; align-items: center; justify-content: space-between; gap: 4px;
    margin-bottom: 6px;
  }
  .exp-cat-tile-name {
    font-size: 9px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  .exp-cat-tile-count {
    font-size: 9px; color: var(--text2); letter-spacing: 0.05em;
  }
  .exp-cat-tile-remaining {
    font-size: 20px; font-weight: 700; line-height: 1.2;
  }
  .exp-cat-tile-remaining.positive { color: #4A7A3A; }
  .exp-cat-tile-remaining.negative { color: var(--accent-red); }
  .exp-cat-tile-remaining.zero { color: var(--text2); }
  .exp-cat-tile-spent {
    font-size: 9px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .exp-cat-tile-rule {
    border: none; border-top: 1px solid var(--border);
    margin: 8px 0 6px;
  }
  .exp-cat-tile-preview {
    display: flex; flex-direction: column; gap: 3px;
  }
  .exp-cat-tile-row {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 2px 0;
  }
  .exp-cat-tile-row-info {
    flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 5px;
    flex-wrap: wrap;
  }
  .exp-cat-tile-row-name {
    color: var(--text); font-weight: 400; font-size: 10px;
    word-break: break-word; min-width: 0;
  }
  .exp-cat-tile-row-date {
    color: var(--text2); font-size: 9px; flex-shrink: 0;
  }
  .exp-cat-tile-row-amt {
    color: var(--text); font-weight: 700; font-size: 10px; flex-shrink: 0;
    text-align: right; min-width: 36px;
  }
  .exp-cat-tile-more {
    font-size: 9px; color: var(--text2); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
  }
  .exp-cat-tile.empty { opacity: 0.45; cursor: default; }
  .exp-cat-items { padding: 0; }
  .exp-item { padding: 5px 0; }
  .exp-item-name { font-size: 10px; }
  .exp-item-date { font-size: 8px; }
  .exp-item-amount { font-size: 11px; }
  .exp-item-btn { font-size: 12px; padding: 2px 2px; }
  .exp-edit-modal { width: 90vw; max-width: 320px; }
}
</style>

<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-label">// Enter Password</div>
  <input class="lock-input" id="lockInput" type="password" placeholder="..." autofocus>
  <div class="lock-error" id="lockError"></div>
</div>


<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('log')">Log</button>
    <button class="tab-btn" onclick="switchTab('expenses')">Expenses</button>
    <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab-btn" onclick="switchTab('growth')">Growth</button>
  </div>

  <div class="tab-content active" id="tab-log">
    <div class="log-wrap">
      <div class="log-heading">Quick Log</div>
      <div class="log-field">
        <label>Amount</label>
        <input type="number" inputmode="decimal" id="log_amount" placeholder="0.00" autofocus>
      </div>
      <div class="log-field">
        <label>Name</label>
        <input type="text" id="log_name" placeholder="E.G. COFFEE">
      </div>
      <div class="log-field">
        <label>Category</label>
        <div id="logCatCombo"></div>
      </div>
      <div class="log-field">
        <label>Card</label>
        <div class="card-toggle-wrap" id="logCardToggle">
          <button type="button" class="card-toggle-btn active" data-card="Amex" onclick="selectCardToggle(this)">AMEX</button>
          <button type="button" class="card-toggle-btn" data-card="Apple" onclick="selectCardToggle(this)">APPLE</button>
          <button type="button" class="card-toggle-btn" data-card="Chase" onclick="selectCardToggle(this)">CHASE</button>
        </div>
      </div>
      <div class="log-field">
        <label>Date</label>
        <input type="date" id="log_date">
      </div>
      <button class="log-submit" onclick="addExpenseFromLog()">+ Log Expense</button>
      <div class="log-confirm" id="logConfirm">Added!</div>
      <div class="log-recent" id="logRecent"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-calendar">
    <div class="cal-header">
      <h1 id="monthTitle"></h1>
      <div class="cal-nav">
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="arrow-btn" onclick="navMonth(-1)">&#8249;</button>
        <button class="arrow-btn" onclick="navMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="dow-row">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-expenses">
    <div class="expenses-wrap">
      <div class="expenses-header">
        <h1 id="expMonthTitle"></h1>
        <div class="exp-nav">
          <button class="arrow-btn" onclick="navExpMonth(-1)">&#8249;</button>
          <button class="arrow-btn" onclick="navExpMonth(1)">&#8250;</button>
        </div>
      </div>
      <div id="expCardFilter"></div>
      <div class="exp-budget-section" id="expBudgetSection"></div>
      <div class="exp-summary" id="expSummary"></div>
      <div class="exp-columns" id="expColumns"></div>
    </div>
    <div id="expEditOverlay"></div>
  </div>

  <div class="tab-content" id="tab-growth">
    <div class="growth-wrap">
      <div class="growth-inputs">
        <div class="growth-field">
          <label>Starting Balance</label>
          <input type="number" inputmode="decimal" id="g_start" placeholder="10000" oninput="calcGrowth()">
        </div>
        <div class="growth-field">
          <label>Annual Rate (%)</label>

// --- Supabase sync ---

      };

      }
    }

    const { data: stData } = await sb.from('statements').select('*').eq('user_id', currentUserId);

    }));

    // Re-sync localStorage with remote data

    save('statements', statements);
    save('transactions', transactions);
    save('expenses', expenses);
  } catch (err) {
    // Supabase unreachable — fall back to localStorage data already in memory
    console.warn('loadFromSupabase failed, using localStorage:', err);

}

// --- Mobile detection ---
const isMobile = () => window.innerWidth <= 768;

// --- Date helpers ---
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
const ACCT_LABELS = { external: 'External', checking: 'Checking', savings: 'Savings' };

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function dateKey(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmt(n) {
  const neg = n < 0;
  const abs = Math.abs(Math.round(n));
  return (neg ? '-' : '') + '$' + abs.toLocaleString('en-US');
}

// --- Paycheck: every other Thursday ---
function isPayday(y, m, d) {
  if (!settings.paycheck.seedDate || !settings.paycheck.amount) return false;
  const seed = parseDate(settings.paycheck.seedDate);
  const seedUTC = Date.UTC(seed.getFullYear(), seed.getMonth(), seed.getDate());
  const targetUTC = Date.UTC(y, m, d);
  const diffDays = Math.round((targetUTC - seedUTC) / 86400000);
  return diffDays % 14 === 0;
}

function seedIsThursday() {
  if (!settings.paycheck.seedDate) return true;
  return parseDate(settings.paycheck.seedDate).getDay() === 4;
}

function nextPayday() {
  if (!settings.paycheck.seedDate) return null;
  const seed = parseDate(settings.paycheck.seedDate);
  const seedUTC = Date.UTC(seed.getFullYear(), seed.getMonth(), seed.getDate());
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.round((todayUTC - seedUTC) / 86400000);
  const periods = Math.ceil(diffDays / 14);
  return new Date(seedUTC + periods * 14 * 86400000);
}

// --- Transaction recurrence ---
function txOccursOn(tx, dk, y, m, d) {
  if (!tx.date) return false;
  if (tx.recurrence === 'none') {
    return tx.date === dk;
  }
  if (tx.recurrence === 'monthly') {
    if (d !== tx.dayOfMonth) return false;
    return dk.substring(0, 7) >= tx.date.substring(0, 7);
  }
  if (tx.recurrence === 'interval') {
    const start = parseDate(tx.date);
    const startUTC = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
    const targetUTC = Date.UTC(y, m, d);
    const diff = Math.round((targetUTC - startUTC) / 86400000);
    return diff >= 0 && diff % tx.intervalDays === 0;
  }
  return false;
}

function txPillClass(tx) {
  if (tx.source !== 'external' && tx.target !== 'external') return 'pill-transfer';
  if (tx.target === 'checking' || tx.target === 'savings') return 'pill-income';
  return 'pill-expense';
}

// --- Event computation ---
function getEventsForDay(y, m, d) {
  const events = [];
  const dk = dateKey(y, m, d);

  if (isPayday(y, m, d)) {
    events.push({
      type: 'paycheck', label: 'Paycheck', amount: settings.paycheck.amount,
      source: 'external', target: 'checking', pillClass: 'pill-income'
    });
  }

  if (settings.rent.amount && settings.rent.dayOfMonth === d) {
    events.push({
      type: 'rent', label: 'Rent', amount: settings.rent.amount,
      source: 'checking', target: 'external', pillClass: 'pill-expense'
    });
  }

  // Credit card statements
  for (const stmt of statements) {
    if (stmt.dueDate === dk && stmt.amount) {
      events.push({
        type: 'cc', label: stmt.card, amount: stmt.amount,
        source: 'checking', target: 'external', pillClass: 'pill-expense'
      });
    }
  }

  for (const tx of transactions) {
    if (txOccursOn(tx, dk, y, m, d)) {
      events.push({
        type: 'tx', label: tx.label, amount: tx.amount,
        source: tx.source, target: tx.target, pillClass: txPillClass(tx)
      });
    }
  }

  return events;
}

// --- Balance computation ---
function eventNetChecking(e) {
  let net = 0;
  if (e.target === 'checking') net += e.amount;
  if (e.source === 'checking') net -= e.amount;
  return net;
}

function eventNetSavings(e) {
  let net = 0;
  if (e.target === 'savings') net += e.amount;
  if (e.source === 'savings') net -= e.amount;
  return net;
}

function computeBalances() {
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const dim = daysInMonth(viewYear, viewMonth);
  const totalCells = firstDow + dim;
  const rowCount = totalCells <= 35 ? 5 : 6;

  const gridStart = new Date(viewYear, viewMonth, 1 - firstDow);
  const gridEnd = new Date(viewYear, viewMonth, 1 - firstDow + rowCount * 7 - 1);
  const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  const startDate = gridStart < todayDate ? gridStart : todayDate;
  const endDate = gridEnd > todayDate ? gridEnd : todayDate;

  const days = [];
  let cur = new Date(startDate);
  while (cur <= endDate) {
    const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
    const dk = dateKey(y, m, d);
    const events = getEventsForDay(y, m, d);
    const netChecking = events.reduce((s, e) => s + eventNetChecking(e), 0);
    const netSavings = events.reduce((s, e) => s + eventNetSavings(e), 0);
    days.push({ dk, events, netChecking, netSavings });
    cur.setDate(cur.getDate() + 1);
  }

  let cumCheckingBefore = 0, cumSavingsBefore = 0;
  for (const day of days) {
    if (day.dk >= todayKey) break;
    cumCheckingBefore += day.netChecking;
    cumSavingsBefore += day.netSavings;
  }

  const results = {};
  let cumC = 0, cumS = 0;
  for (const day of days) {
    cumC += day.netChecking;
    cumS += day.netSavings;
    results[day.dk] = {
      checking: settings.checkingBalance + cumC - cumCheckingBefore,
      savings: settings.savingsBalance + cumS - cumSavingsBefore,
      events: day.events
    };
  }

  return results;
}

function computeBalancesForMonth(y, m) {
  const firstDow = new Date(y, m, 1).getDay();
  const dim = daysInMonth(y, m);
  const totalCells = firstDow + dim;
  const baseRows = totalCells <= 35 ? 5 : 6;
  const rows = isMobile() ? 7 : baseRows;

  const gridStart = new Date(y, m, 1 - firstDow);
  const gridEnd = new Date(y, m, 1 - firstDow + rows * 7 - 1);
  const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  // Always include today in the range so cumulative balances are correct
  const startDate = gridStart < todayDate ? gridStart : todayDate;
  const endDate = gridEnd > todayDate ? gridEnd : todayDate;

  const days = [];
  let cur = new Date(startDate);
  while (cur <= endDate) {
    const cy = cur.getFullYear(), cm = cur.getMonth(), cd = cur.getDate();
    const dk = dateKey(cy, cm, cd);
    const events = getEventsForDay(cy, cm, cd);
    const netChecking = events.reduce((s, e) => s + eventNetChecking(e), 0);
    const netSavings = events.reduce((s, e) => s + eventNetSavings(e), 0);
    days.push({ dk, events, netChecking, netSavings });
    cur.setDate(cur.getDate() + 1);
  }

  let cumCheckingBefore = 0, cumSavingsBefore = 0;
  for (const day of days) {
    if (day.dk >= todayKey) break;
    cumCheckingBefore += day.netChecking;
    cumSavingsBefore += day.netSavings;
  }

  const results = {};
  let cumC = 0, cumS = 0;
  for (const day of days) {
    cumC += day.netChecking;
    cumS += day.netSavings;
    results[day.dk] = {
      checking: settings.checkingBalance + cumC - cumCheckingBefore,
      savings: settings.savingsBalance + cumS - cumSavingsBefore,
      events: day.events
    };
  }
  return results;
}

function renderMonthSection(y, m) {
  const balances = computeBalancesForMonth(y, m);
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  const firstDow = new Date(y, m, 1).getDay();
  const dim = daysInMonth(y, m);
  const prevDim = daysInMonth(y, m - 1);
  const totalCells = firstDow + dim;
  const baseRows = totalCells <= 35 ? 5 : 6;
  const rows = isMobile() ? 7 : baseRows;

  const isCurrent = (y === viewYear && m === viewMonth);
  const labelText = `${MONTH_NAMES[m]} ${y}`;
  const labelHtml = isCurrent ? '' : `<div class="month-label">${labelText}</div>`;

  let gridHtml = '';

  // Leading days from prev month
  for (let i = 0; i < firstDow; i++) {
    const d = prevDim - firstDow + 1 + i;
    const pm = m === 0 ? 11 : m - 1;
    const py = m === 0 ? y - 1 : y;
    const dk = dateKey(py, pm, d);
    gridHtml += renderCell(d, dk, balances[dk], true, false);
  }

  // Current month days
  for (let d = 1; d <= dim; d++) {
    const dk = dateKey(y, m, d);
    gridHtml += renderCell(d, dk, balances[dk], false, dk === todayKey);
  }

  // Trailing days to fill base rows
  const baseRemaining = baseRows * 7 - totalCells;
  for (let i = 1; i <= baseRemaining; i++) {
    const nm = m === 11 ? 0 : m + 1;
    const ny = m === 11 ? y + 1 : y;
    const dk = dateKey(ny, nm, i);
    gridHtml += renderCell(i, dk, balances[dk], true, false);
  }

  // Extra rows on mobile: replicate the first rows of the next month's grid
  if (isMobile() && rows > baseRows) {
    const nm = m === 11 ? 0 : m + 1;
    const ny = m === 11 ? y + 1 : y;
    const nextBalances = computeBalancesForMonth(ny, nm);
    const nextFirstDow = new Date(ny, nm, 1).getDay();
    const nextPrevDim = daysInMonth(ny, nm - 1);
    const extraCells = (rows - baseRows) * 7;

    let cellCount = 0;
    // Leading days of next month (from current month)
    for (let i = 0; i < nextFirstDow && cellCount < extraCells; i++, cellCount++) {
      const d = nextPrevDim - nextFirstDow + 1 + i;
      const dk = dateKey(y, m, d);
      gridHtml += renderCell(d, dk, nextBalances[dk], true, false);
    }
    // Days of next month
    for (let d = 1; cellCount < extraCells; d++, cellCount++) {
      const dk = dateKey(ny, nm, d);
      gridHtml += renderCell(d, dk, nextBalances[dk], false, dk === todayKey);
    }
  }

  const dowRow = `<div class="section-dow-row"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>`;

  return `<div class="month-section" data-year="${y}" data-month="${m}">
    ${labelHtml}
    ${dowRow}
    <div class="cal-grid" style="grid-template-rows: repeat(${rows}, 1fr)">${gridHtml}</div>
  </div>`;
}

function renderMobile() {
  document.getElementById('monthTitle').textContent =
    `${MONTH_NAMES[viewMonth]} ${viewYear}`;

  const wrap = document.querySelector('.cal-grid-wrap');

  // Compute prev/current/next months
  let prevM = viewMonth - 1, prevY = viewYear;
  if (prevM < 0) { prevM = 11; prevY--; }
  let nextM = viewMonth + 1, nextY = viewYear;
  if (nextM > 11) { nextM = 0; nextY++; }

  wrap.innerHTML =
    renderMonthSection(prevY, prevM) +
    renderMonthSection(viewYear, viewMonth) +
    renderMonthSection(nextY, nextM);

  // Scroll to middle section (current month) instantly
  const sections = wrap.querySelectorAll('.month-section');
  if (sections[1]) {
    wrap.scrollTo({ top: sections[1].offsetTop, behavior: 'instant' });
  }

  // Set up scroll-snap listener
  clearTimeout(wrap._snapTimer);
  wrap.onscroll = function() {
    clearTimeout(wrap._snapTimer);
    wrap._snapTimer = setTimeout(() => {
      const sections = wrap.querySelectorAll('.month-section');
      const scrollTop = wrap.scrollTop;
      const wrapH = wrap.clientHeight;

      let snappedIdx = 0;
      let minDist = Infinity;
      sections.forEach((sec, i) => {
        const dist = Math.abs(sec.offsetTop - scrollTop);
        if (dist < minDist) { minDist = dist; snappedIdx = i; }
      });

      const snapped = sections[snappedIdx];
      const snappedY = parseInt(snapped.dataset.year);
      const snappedM = parseInt(snapped.dataset.month);

      // Update header to match snapped month
      document.getElementById('monthTitle').textContent =
        `${MONTH_NAMES[snappedM]} ${snappedY}`;

      // If snapped to first or last, re-center
      if (snappedIdx === 0 || snappedIdx === 2) {
        viewYear = snappedY;
        viewMonth = snappedM;
        renderMobile();
      }
    }, 150);
  };
}

// --- Render calendar ---
function render() {
  if (isMobile()) { renderMobile(); return; }
  document.getElementById('monthTitle').textContent =
    `${MONTH_NAMES[viewMonth]} ${viewYear}`;

  const grid = document.getElementById('calGrid');
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const dim = daysInMonth(viewYear, viewMonth);
  const prevDim = daysInMonth(viewYear, viewMonth - 1);

  const balances = computeBalances();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let html = '';

  for (let i = 0; i < firstDow; i++) {
    const d = prevDim - firstDow + 1 + i;
    const pm = viewMonth === 0 ? 11 : viewMonth - 1;
    const py = viewMonth === 0 ? viewYear - 1 : viewYear;
    const dk = dateKey(py, pm, d);
    html += renderCell(d, dk, balances[dk], true, false);
  }

  for (let d = 1; d <= dim; d++) {
    const dk = dateKey(viewYear, viewMonth, d);
    html += renderCell(d, dk, balances[dk], false, dk === todayKey);
  }

  const totalCells = firstDow + dim;
  const rows = totalCells <= 35 ? 5 : 6;
  const remaining = rows * 7 - totalCells;
  for (let i = 1; i <= remaining; i++) {
    const nm = viewMonth === 11 ? 0 : viewMonth + 1;
    const ny = viewMonth === 11 ? viewYear + 1 : viewYear;
    const dk = dateKey(ny, nm, i);
    html += renderCell(i, dk, balances[dk], true, false);
  }

  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  grid.innerHTML = html;
}

function renderCell(d, dk, data, otherMonth, isToday) {
  const cls = ['day-cell'];
  if (otherMonth) cls.push('other-month');
  if (isToday) cls.push('today');

  let inner = `<div class="day-num">${d}</div>`;

  if (data) {
    const balCls = data.checking < 0 ? ' negative' : '';
    inner += `<div class="day-balance${balCls}">${fmt(data.checking)}</div>`;

    if (settings.showSavings) {
      const savCls = data.savings < 0 ? ' negative' : '';
      inner += `<div class="day-savings${savCls}">${fmt(data.savings)}</div>`;
    }

    if (data.events.length > 0) {
      inner += '<div class="day-events">';
      for (const e of data.events) {
        const sign = e.source === 'external' ? '+' : (e.target === 'external' ? '-' : '');
        const display = sign ? `${sign}${fmt(e.amount)}` : fmt(e.amount);
        inner += `<div class="event-pill ${e.pillClass}">${e.label} ${display}</div>`;
      }
      inner += '</div>';
    }
  }

  return `<div class="${cls.join(' ')}">${inner}</div>`;
}

// --- Navigation ---
function navMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (isMobile()) {
    render();
    if (settingsOpen) renderSettings();
    return;
  }
  const grid = document.getElementById('calGrid');
  grid.classList.add('fade-out');
  setTimeout(() => {
    render();
    if (settingsOpen) renderSettings();
    grid.classList.remove('fade-out');
  }, 150);
}

function goToday() {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  if (isMobile()) {
    render();
    if (settingsOpen) renderSettings();
    return;
  }
  const grid = document.getElementById('calGrid');
  grid.classList.add('fade-out');
  setTimeout(() => {
    render();
    if (settingsOpen) renderSettings();
    grid.classList.remove('fade-out');

// --- Settings ---

let expandedTxId = null;
let expandedStmtId = null;

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  expandedTxId = expandedTxId === id ? null : id;
  renderSettings();
}

function toggleStmtExpand(id, e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
  expandedStmtId = expandedStmtId === id ? null : id;
  renderSettings();

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.body.classList.toggle('settings-open', settingsOpen);
  document.getElementById('sidebar').classList.toggle('open', settingsOpen);
  if (settingsOpen) renderSettings();
}

    </div>`;
    dateLabel.textContent = 'Starting';
  } else {
    container.innerHTML = '';
    dateLabel.textContent = 'Date';

}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// --- Updaters ---
function updateSetting(key, val) {
  if (key === 'showSavings') settings[key] = val;
  else settings[key] = parseFloat(val) || 0;
  persist(); render(); if (settingsOpen) renderSettings();
}

function updateRent(key, val) {
  settings.rent[key] = key === 'dayOfMonth' ? (parseInt(val) || 1) : (parseFloat(val) || 0);
  persist(); render();
}

function updatePaycheck(key, val) {
  if (key === 'seedDate') settings.paycheck.seedDate = val;
  else settings.paycheck.amount = parseFloat(val) || 0;
  persist(); render(); renderSettings();
}

// --- Statement CRUD ---
function addStmt() {
  const card = document.getElementById('stmt_card').value;
  const amount = parseFloat(document.getElementById('stmt_amount').value);
  const dueDate = document.getElementById('stmt_due').value;
  if (!amount || !dueDate) return;
  statements.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    card, amount, dueDate, hidden: false
  });
  persist(); render(); renderSettings();
}

function updateStmt(id, field, val) {
  const s = statements.find(s => s.id === id);
  if (!s) return;
  if (field === 'amount') s.amount = parseFloat(val) || 0;
  else s[field] = val;
  persist(); render();
}

function hideStmt(id) {
  const s = statements.find(s => s.id === id);
  if (s) { s.hidden = true; persist(); render(); renderSettings(); }
}

function unhideStmt(id) {
  const s = statements.find(s => s.id === id);
  if (s) { s.hidden = false; persist(); render(); renderSettings(); }
}

function deleteStmt(id) {
  statements = statements.filter(s => s.id !== id);
  persist(); render(); renderSettings();
}

function addTx() {
  const label = document.getElementById('tx_label').value.trim();
  const amount = parseFloat(document.getElementById('tx_amount').value);
  const source = document.getElementById('tx_source').value;
  const target = document.getElementById('tx_target').value;
  const recurrence = document.getElementById('tx_recurrence').value;
  const date = document.getElementById('tx_date').value;

  const err = document.getElementById('tx_error');
  if (err) err.remove();

  if (!label || !amount || !date) {
    showTxError('Fill in label, amount, and date.');
    return;
  }
  if (source === target) {
    showTxError('Source and destination must be different.');
    return;
  }

  const tx = {
    id: Date.now().toString(36), label, amount, source, target, date, recurrence,
    dayOfMonth: 1, intervalDays: 14
  };

  if (recurrence === 'monthly') {
    const dom = document.getElementById('tx_dayOfMonth');
    tx.dayOfMonth = parseInt(dom?.value) || 1;
  }
  if (recurrence === 'interval') {
    const intv = document.getElementById('tx_intervalDays');
    tx.intervalDays = parseInt(intv?.value) || 14;
  }

  transactions.push(tx);
  persist();
  render();
  renderSettings();

  const items = document.querySelectorAll('.tx-item');
  if (items.length) {
    items[items.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function showTxError(msg) {
  const form = document.getElementById('txForm');
  if (!form) return;
  const el = document.createElement('div');
  el.id = 'tx_error';
  el.style.cssText = 'font-size:10px;color:var(--accent-red);padding:4px 0 0;text-transform:uppercase;letter-spacing:0.08em;';
  el.textContent = msg;
  form.querySelector('.add-btn').insertAdjacentElement('beforebegin', el);
}

function updateTx(id, field, val) {
  const tx = transactions.find(t => t.id === id);
  if (!tx) return;
  if (field === 'amount') tx.amount = parseFloat(val) || 0;
  else if (field === 'dayOfMonth') tx.dayOfMonth = parseInt(val) || 1;
  else if (field === 'intervalDays') tx.intervalDays = parseInt(val) || 14;
  else if (field === 'recurrence') {
    tx.recurrence = val;
    persist(); render(); renderSettings(); return;
  }
  else tx[field] = val;
  persist(); render();
}

function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  persist(); render(); renderSettings();
}

// --- Expenses ---
let expenses = load('expenses') || [];
let expBudget = load('expBudget') || 0;
let expViewYear = today.getFullYear();
let expViewMonth = today.getMonth();
let editingExpId = null;
let expandedExpCats = new Set();
let expCardFilter = 'All';
let catBudgets = load('catBudgets') || { Groceries: 0, Dining: 0, Shopping: 0, Travel: 0, Other: 0 };
// Default cycle: 1st of this month to 1st of next month
function defaultCycleStart() {
  const y = today.getFullYear(), m = today.getMonth();
  return dateKey(y, m, 1);
}
function defaultCycleEnd() {
  const y = today.getFullYear(), m = today.getMonth();
  const d = new Date(y, m + 1, 1);
  return dateKey(d.getFullYear(), d.getMonth(), d.getDate());
}

let cardBudgets = load('cardBudgets') || {
  Amex:  { cycleStart: defaultCycleStart(), cycleEnd: defaultCycleEnd(), dueDate: '', budget: 0 },
  Apple: { cycleStart: defaultCycleStart(), cycleEnd: defaultCycleEnd(), dueDate: '', budget: 0 },
  Chase: { cycleStart: defaultCycleStart(), cycleEnd: defaultCycleEnd(), dueDate: '', budget: 0 }
};

// Migrate old formats to new cycleStart/cycleEnd + per-cycle budgets
for (const card of Object.keys(cardBudgets)) {
  const cb = cardBudgets[card];
  if (cb.closeDay && !cb.cycleStart) {
    const closeDay = Math.min(parseInt(cb.closeDay) || 1, 28);
    const y = today.getFullYear(), m = today.getMonth();
    const thisClose = new Date(y, m, closeDay);
    const startD = thisClose <= today ? thisClose : new Date(y, m - 1, closeDay);
    const endD = new Date(startD.getFullYear(), startD.getMonth() + 1, closeDay);
    cb.cycleStart = dateKey(startD.getFullYear(), startD.getMonth(), startD.getDate());
    cb.cycleEnd = dateKey(endD.getFullYear(), endD.getMonth(), endD.getDate());
    delete cb.closeDay;
    delete cb.dueDay;
  }
  // Migrate flat budget/dueDate into per-cycle budgets object
  if (cb.budget !== undefined || cb.dueDate !== undefined) {
    if (!cb.budgets) cb.budgets = {};
    const key = cb.cycleStart || defaultCycleStart();
    if (!cb.budgets[key]) cb.budgets[key] = { total: 0, dueDate: '', cats: {} };
    if (cb.budget) { cb.budgets[key].total = cb.budget; delete cb.budget; }
    if (cb.dueDate) { cb.budgets[key].dueDate = cb.dueDate; delete cb.dueDate; }
  }
}

function getCycleRange(card) {
  const cb = cardBudgets[card] || {};
  const start = cb.cycleStart || defaultCycleStart();
  const end = cb.cycleEnd || defaultCycleEnd();
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  return {
    start, end,
    label: `${fmtCycleDate(s)} \u2013 ${fmtCycleDate(e)}`
  };
}

function navExpCycle(dir) {
  const card = expCardFilter;
  const cb = cardBudgets[card];
  if (!cb) return;
  const s = new Date(cb.cycleStart + 'T00:00:00');
  const e = new Date(cb.cycleEnd + 'T00:00:00');
  const lenMs = e - s;
  let newStart, newEnd;
  if (dir > 0) {
    newStart = e;
    newEnd = new Date(e.getTime() + lenMs);
  } else {
    newEnd = s;
    newStart = new Date(s.getTime() - lenMs);
  }
  cb.cycleStart = dateKey(newStart.getFullYear(), newStart.getMonth(), newStart.getDate());
  cb.cycleEnd = dateKey(newEnd.getFullYear(), newEnd.getMonth(), newEnd.getDate());
  persist();
  renderExpenses();
}

function fmtCycleDate(d) {
  return `${MONTH_NAMES[d.getMonth()].substring(0,3).toUpperCase()} ${d.getDate()}`;
}

function getCycleBudgets(card, cycleStart) {
  const cb = cardBudgets[card] || {};
  if (!cb.budgets) cb.budgets = {};
  return cb.budgets[cycleStart] || { total: 0, dueDate: '', cats: {} };
}

function updateCycleBudget(card, cycleStart, field, val) {
  if (!cardBudgets[card]) cardBudgets[card] = {};
  if (!cardBudgets[card].budgets) cardBudgets[card].budgets = {};
  if (!cardBudgets[card].budgets[cycleStart]) cardBudgets[card].budgets[cycleStart] = { total: 0, dueDate: '', cats: {} };
  const entry = cardBudgets[card].budgets[cycleStart];
  if (field === 'total') entry.total = parseFloat(val) || 0;
  else if (field === 'dueDate') entry.dueDate = val;
  else if (field.startsWith('cat:')) entry.cats[field.slice(4)] = parseFloat(val) || 0;
  persist();
  renderExpenses();
}

function updateCardBudget(card, field, val) {
  if (!cardBudgets[card]) cardBudgets[card] = {};
  cardBudgets[card][field] = val;
  persist();
  renderExpenses();
}

// --- Category combo (select + inline new) ---
function renderCatCombo(containerId, selected) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const opts = categories.map(c =>
    `<option value="${c}"${c === selected ? ' selected' : ''}>${c}</option>`
  ).join('');
  el.innerHTML = `<select onchange="catComboChange(this,'${containerId}')">
    ${opts}<option value="__new">+ New Category</option>
  </select>`;
}

function catComboChange(sel, containerId) {
  if (sel.value !== '__new') return;
  const el = document.getElementById(containerId);
  el.innerHTML = `<input type="text" class="cat-new-input" placeholder="TYPE NEW CATEGORY" autofocus
    onkeydown="if(event.key==='Enter')catComboCommit(this,'${containerId}')"
    onblur="catComboCommit(this,'${containerId}')">`;
  el.querySelector('input').focus();
}

function catComboCommit(input, containerId) {
  const name = input.value.trim();
  if (name && !categories.includes(name)) {
    categories.push(name);
    persist();
  }
  renderCatCombo(containerId, name || categories[0]);
}

function getCatComboValue(containerId) {
  const el = document.getElementById(containerId);
  const sel = el.querySelector('select');
  if (sel) return sel.value === '__new' ? '' : sel.value;
  const inp = el.querySelector('input');
  return inp ? inp.value.trim() : '';
}

function refreshCatList() {
  renderCatCombo('logCatCombo');
}

// --- Category edit (inline on expense headers) ---
let editingCatName = null;

function toggleCatEdit(cat) {
  editingCatName = editingCatName === cat ? null : cat;
  renderExpenses();
  if (editingCatName) {
    const inp = document.getElementById('catRenameInput');
    if (inp) { inp.focus(); inp.select(); }
  }
}

function renameCategory(oldName) {
  const inp = document.getElementById('catRenameInput');
  const newName = inp ? inp.value.trim() : '';
  if (!newName || newName === oldName) { editingCatName = null; renderExpenses(); return; }
  if (categories.includes(newName)) { editingCatName = null; renderExpenses(); return; }
  // Update categories list
  categories = categories.map(c => c === oldName ? newName : c);
  // Update all expenses
  for (const e of expenses) { if (e.category === oldName) e.category = newName; }
  // Update catBudgets
  if (catBudgets[oldName] !== undefined) {
    catBudgets[newName] = catBudgets[oldName];
    delete catBudgets[oldName];
  }
  editingCatName = null;
  persist(); persistExpenses();
  refreshCatList();
  renderExpenses();
}

function deleteCategory(name) {
  if (categories.length <= 1) return;
  const used = expenses.filter(e => e.category === name);
  const fallback = categories.find(c => c !== name);
  if (used.length && !confirm(`${used.length} expense(s) in "${name}" will move to "${fallback}".`)) return;
  for (const e of used) e.category = fallback;
  categories = categories.filter(c => c !== name);
  delete catBudgets[name];
  editingCatName = null;
  persist(); persistExpenses();
  refreshCatList();
  renderExpenses();
}

// --- Log tab ---
function cardPillHtml(card) {
  return `<span class="card-pill" data-card="${card}">${card}</span>`;
}

function selectCardToggle(btn) {
  btn.closest('.card-toggle-wrap').querySelectorAll('.card-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function initLogDate() {
  const d = document.getElementById('log_date');
  if (d && !d.value) d.value = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
}

function addExpenseFromLog() {
  const amountEl = document.getElementById('log_amount');
  const nameEl = document.getElementById('log_name');
  const dateEl = document.getElementById('log_date');
  const amount = parseFloat(amountEl.value);
  const label = nameEl.value.trim();
  const catRaw = getCatComboValue('logCatCombo');
  const date = dateEl.value;
  if (!amount || !label || !catRaw || !date) return;
  // Ensure category is in the list
  if (!categories.includes(catRaw)) { categories.push(catRaw); persist(); }
  const category = catRaw;

  const card = document.querySelector('.card-toggle-btn.active')?.dataset.card || 'Amex';
  expenses.push({
    id: crypto.randomUUID(),
    label, amount, category, date, card,
    created_at: new Date().toISOString()
  });
  persistExpenses();

  // Reset form
  amountEl.value = '';
  nameEl.value = '';
  dateEl.value = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  renderCatCombo('logCatCombo', category);
  // Reset card toggle to Amex default
  const cardBtns = document.querySelectorAll('#logCardToggle .card-toggle-btn');
  cardBtns.forEach(b => b.classList.remove('active'));
  cardBtns[0]?.classList.add('active');

  // Flash confirmation
  const conf = document.getElementById('logConfirm');
  conf.textContent = `${label} — ${fmt(amount)} added`;
  conf.classList.add('show');
  setTimeout(() => conf.classList.remove('show'), 2000);

  renderLogRecent();
}

function renderLogRecent() {
  initLogDate();
  const container = document.getElementById('logRecent');
  if (!container) return;
  // Show last 5 expenses sorted by created_at desc
  const recent = [...expenses].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || '')).slice(0, 5);
  if (!recent.length) {
    container.innerHTML = '';
    return;
  }
  let html = '<div class="log-recent-heading">Recent</div>';
  for (const e of recent) {
    const d = parseDate(e.date);
    const dateStr = `${MONTH_NAMES[d.getMonth()].substring(0, 3)} ${d.getDate()} · ${e.category}`.toUpperCase();
    html += `<div class="log-recent-item">
      <div class="log-recent-info">
        <div class="log-recent-name">${e.label}</div>
        <div class="log-recent-meta">${dateStr}</div>
      </div>
      <div class="log-recent-amount">${fmt(e.amount)}${cardPillHtml(e.card || 'Amex')}</div>
    </div>`;
  }
  container.innerHTML = html;
}

function persistExpenses() {
  save('expenses', expenses);
  save('expBudget', expBudget);
  save('catBudgets', catBudgets);

  if (!currentUserId) return;

  sb.from('expenses').delete().eq('user_id', currentUserId).then(() => {
    if (expenses.length > 0) {
      sb.from('expenses').insert(expenses.map(e => ({
        id: e.id, user_id: currentUserId, label: e.label,
        amount: e.amount, category: e.category, date: e.date, card: e.card
      }))).then();
    }
  });
}

}

    const cb = cardBudgets[expCardFilter] || {};
    const cycleBud = getCycleBudgets(expCardFilter, start);
    activeCycleStart = start;
    activeCycleBud = cycleBud;
    document.getElementById('expMonthTitle').textContent = expCardFilter.toUpperCase();
    const ds = 'background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;padding:2px 0;font-family:var(--font);outline:none';

      <button class="arrow-btn" onclick="navExpCycle(-1)">&#8249;</button>

    document.querySelector('.exp-nav').style.display = '';

    filteredExps = expenses.filter(e =>
      (e.card || 'Amex') === expCardFilter && e.date && e.date >= start && e.date < end
    );
    spent = filteredExps.reduce((s, e) => s + e.amount, 0);
    remaining = budget - spent;

    // Budget section: card cycle view
    document.getElementById('expBudgetSection').innerHTML = `
      <div class="exp-budget-label">${expCardFilter.toUpperCase()} Budget <button onclick="promptAddCategory()" style="background:none;border:none;color:var(--text2);font-family:var(--font);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;opacity:0.6;padding:0;margin-left:8px">+ Add Category</button></div>
      <div class="exp-budget-row">
        <div class="exp-budget-field">
          <label>Budget</label>
          <input class="exp-budget-input" type="number" inputmode="decimal"
            value="${budget || ''}" placeholder="0"
            onchange="updateCycleBudget('${expCardFilter}','${start}','total',this.value)">
        </div>
        <div class="exp-budget-field">
          <label>Due Date</label>
          <input type="date" style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:14px;padding:4px 0;font-family:var(--font);outline:none"
            value="${cycleBud.dueDate || ''}"

    document.querySelector('.exp-nav').innerHTML = `
      <button class="arrow-btn" onclick="navExpMonth(-1)">&#8249;</button>
      <button class="arrow-btn" onclick="navExpMonth(1)">&#8250;</button>`;
    document.querySelector('.exp-nav').style.display = '';

    const monthExps = expenses.filter(e => e.date && e.date.substring(0, 7) === monthKey);
    filteredExps = monthExps;
    spent = filteredExps.reduce((s, e) => s + e.amount, 0);
    remaining = budget - spent;

    // Budget section: monthly view (existing)
    document.getElementById('expBudgetSection').innerHTML = `
      <div class="exp-budget-label">Monthly Budget <button onclick="promptAddCategory()" style="background:none;border:none;color:var(--text2);font-family:var(--font);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;opacity:0.6;padding:0;margin-left:8px">+ Add Category</button></div>
      <div class="exp-budget-row">
        <div class="exp-budget-field">
          <label>Total</label>
          <input class="exp-budget-input" type="number" inputmode="decimal" id="expBudgetInput"
            value="${expBudget || ''}" placeholder="0"
            onchange="updateExpBudget(this.value)">
        </div>
        <div class="exp-budget-cats" id="expBudgetCats"></div>
      </div>`;
  }

  // Render card filter bar (unchanged)
  document.getElementById('expCardFilter').innerHTML = `
    <div class="card-filter-bar">
      <button class="card-filter-btn${expCardFilter === 'All' ? ' active' : ''}" onclick="setExpCardFilter('All')">ALL</button>
      <button class="card-filter-btn${expCardFilter === 'Amex' ? ' active' : ''}" data-card="Amex" onclick="setExpCardFilter('Amex')">AMEX</button>
      <button class="card-filter-btn${expCardFilter === 'Apple' ? ' active' : ''}" data-card="Apple" onclick="setExpCardFilter('Apple')">APPLE</button>
      <button class="card-filter-btn${expCardFilter === 'Chase' ? ' active' : ''}" data-card="Chase" onclick="setExpCardFilter('Chase')">CHASE</button>
    </div>`;

  // Render category budget inputs (scoped to filteredExps regardless of mode)
  document.getElementById('expBudgetCats').innerHTML = categories.map(c => {
    const esc = c.replace(/'/g, "\\'");
    if (editingCatName === c) {
      return `<div class="exp-budget-cat-field">
        <div class="cat-edit-row" onclick="event.stopPropagation()" style="margin:0;padding:2px 0;border:none">
          <input type="text" id="catRenameInput" class="cat-rename-input" value="${c}" style="font-size:10px"
            onkeydown="if(event.key==='Enter')renameCategory('${esc}');if(event.key==='Escape')toggleCatEdit(null)">
          <button class="cat-edit-btn" onclick="renameCategory('${esc}')">SAVE</button>
          <button class="cat-edit-btn cat-del-btn" onclick="deleteCategory('${esc}')">DELETE</button>
        </div>
      </div>`;
    }
    return `<div class="exp-budget-cat-field">
      <label onclick="toggleCatEdit('${esc}')" style="cursor:pointer">${c}</label>
      <input type="number" inputmode="decimal" value="${activeCycleBud ? (activeCycleBud.cats[c] || '') : (catBudgets[c] || '')}" placeholder="0" onchange="${activeCycleStart ? `updateCycleBudget('${expCardFilter}','${activeCycleStart}','cat:${esc}',this.value)` : `updateCatBudget('${esc}', this.value)`}">
    </div>`;
  }).join('') + (addingNewCat ? `<div class="exp-budget-cat-field">
      <input type="text" id="newCatInput" placeholder="NAME" style="font-size:9px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.1em;background:transparent;border:none;border-bottom:1px solid var(--accent);padding:2px 0;font-family:var(--font);outline:none;width:80px"
        onkeydown="if(event.key==='Enter')commitNewCategory(this);if(event.key==='Escape')cancelNewCategory()"
        onblur="commitNewCategory(this)">
    </div>` : '');

  const remClass = remaining >= 0 ? 'positive' : 'negative';

  document.getElementById('expSummary').innerHTML = `
    <div class="exp-summary-item">
      <span class="exp-summary-label">Remaining</span>
      <span class="exp-summary-value ${remClass}">${fmt(remaining)}</span>

      <span class="exp-summary-label">Spent</span>
      <span class="exp-summary-value negative">${fmt(spent)}</span>
    </div>`;

  // Group by category
  const groups = {};
  for (const e of filteredExps) {
    if (!groups[e.category]) groups[e.category] = [];
    groups[e.category].push(e);
  }

  // Sort within each category by date
  for (const cat in groups) {
    groups[cat].sort((a, b) => a.date.localeCompare(b.date));
  }

  // Also include any categories from expenses that aren't in the current list
  const extraCats = [...new Set(filteredExps.map(e => e.category))].filter(c => !categories.includes(c));
  const catOrder = [...categories, ...extraCats];

  function buildItemsHtml(items) {
    let html = '';
    for (const e of items) {
      const d = parseDate(e.date);
      const dateStr = `${MONTH_NAMES[d.getMonth()].substring(0, 3)} ${d.getDate()}`.toUpperCase();
      html += `
        <div class="exp-item" onclick="openEditExpense('${e.id}')" style="cursor:pointer">
