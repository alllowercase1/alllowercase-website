<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Calendar</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000000;
  --surface: #1C1C1E;
  --border: #2C2C2E;
  --text: #FFFFFF;
  --text2: #8E8E93;
  --today: #FF3B30;
  --income: #2D8A4E;
  --expense: #A63D3D;
  --transfer: #4A6FA5;
  --savings: #0A84FF;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  --sidebar-w: 400px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  margin-right: 0;
  transition: margin-right 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding: 16px 24px 0;
}

body.settings-open #app { margin-right: var(--sidebar-w); }

.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0 20px;
}

.cal-header h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }

.cal-nav { display: flex; gap: 8px; align-items: center; }

.cal-nav button {
  background: none; border: none; color: var(--today); font-size: 20px;
  cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.cal-nav button:hover { background: rgba(255,59,48,0.12); }
.cal-nav .today-btn { font-size: 13px; font-weight: 600; width: auto; padding: 0 12px; border-radius: 16px; }

.dow-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding-bottom: 8px; }
.dow-row span { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

.cal-grid-wrap { flex: 1; position: relative; overflow: hidden; }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr);
  height: 100%; transition: opacity 0.2s ease, transform 0.2s ease;
}
.cal-grid.fade-out { opacity: 0; transform: translateY(6px); }

.day-cell {
  padding: 4px 6px; min-height: 0; overflow: hidden;
  display: flex; flex-direction: column;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.day-cell:nth-child(7n) { border-right: none; }

.day-num {
  font-size: 11px; font-weight: 500; color: var(--text2);
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 2px; flex-shrink: 0;
}
.day-cell.today .day-num { background: var(--today); color: #fff; font-weight: 700; }
.day-cell.other-month .day-num { color: #3A3A3C; }
.day-cell.other-month .day-balance { color: #3A3A3C; }
.day-cell.other-month .day-savings { color: #3A3A3C; }

.day-balance { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; flex-shrink: 0; }
.day-balance.negative { color: #CC5555; }

.day-savings { font-size: 10px; color: var(--savings); font-weight: 500; flex-shrink: 0; }
.day-savings.negative { color: #CC5555; }

.day-events { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; overflow: hidden; flex: 1; min-height: 0; }

.event-pill {
  font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; flex-shrink: 0;
}
.event-pill.pill-income { background: var(--income); }
.event-pill.pill-expense { background: var(--expense); }
.event-pill.pill-transfer { background: var(--transfer); }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; right: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border); z-index: 100;
  transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-header h2 { font-size: 18px; font-weight: 600; }

.sidebar-close {
  background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: background 0.15s;
}
.sidebar-close:hover { background: var(--border); color: var(--text); }

.sidebar-scroll { overflow-y: auto; padding: 16px 20px 32px; flex: 1; }

.s-section { margin-bottom: 20px; }
.s-section h3 {
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}

.s-field {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #2C2C2E; gap: 12px;
}
.s-field:last-child { border-bottom: none; }
.s-field label { font-size: 13px; color: var(--text); flex-shrink: 0; }

.s-field input[type="number"],
.s-field input[type="date"],
.s-field input[type="text"] {
  background: var(--bg); border: 1px solid #3A3A3C; border-radius: 6px;
  color: var(--text); font-size: 13px; padding: 6px 10px; font-family: var(--font);
  outline: none; text-align: right; width: 130px; transition: border-color 0.15s;
}
.s-field input:focus { border-color: var(--savings); }
.s-field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
.s-field input::placeholder { color: #48484A; }

.s-field select {
  background: var(--bg); border: 1px solid #3A3A3C; border-radius: 6px;
  color: var(--text); font-size: 13px; padding: 6px 10px; font-family: var(--font);
  outline: none; cursor: pointer; transition: border-color 0.15s;
}
.s-field select:focus { border-color: var(--savings); }

.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
  position: absolute; inset: 0; background: #39393D; border-radius: 12px;
  cursor: pointer; transition: background 0.25s;
}
.toggle .slider::before {
  content: ''; position: absolute; width: 20px; height: 20px; left: 2px; bottom: 2px;
  background: #fff; border-radius: 50%; transition: transform 0.25s;
}
.toggle input:checked + .slider { background: var(--income); }
.toggle input:checked + .slider::before { transform: translateX(20px); }

/* CC */
.cc-block {
  background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  cursor: pointer; transition: background 0.15s;
}
.cc-block:hover { background: #111; }
.cc-block.expanded { background: #111; cursor: default; }

.cc-summary { display: flex; align-items: center; justify-content: space-between; }
.cc-block-label { font-size: 13px; font-weight: 600; color: var(--text); }
.cc-summary-detail { font-size: 11px; color: var(--text2); }

.cc-edit {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #2C2C2E;
}
.cc-edit .s-field { padding: 6px 0; border-bottom-color: #1C1C1E; }
.cc-edit .s-field label { font-size: 12px; color: var(--text2); }
.cc-edit .s-field input { width: 120px; font-size: 12px; }

/* Transactions */
.tx-item {
  background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
  position: relative; cursor: pointer; transition: background 0.15s;
}
.tx-item:hover { background: #111; }
.tx-item.expanded { background: #111; cursor: default; }

.tx-edit {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #2C2C2E;
}
.tx-edit .s-field { padding: 6px 0; }
.tx-edit .s-field label { font-size: 12px; color: var(--text2); }
.tx-edit .s-field input { width: 120px; font-size: 12px; }
.tx-edit .s-field select { font-size: 12px; }
.tx-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.tx-label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.tx-amount { font-size: 13px; font-weight: 600; flex-shrink: 0; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }
.tx-amount.transfer { color: var(--transfer); }
.tx-del {
  background: none; border: none; color: var(--expense); font-size: 15px;
  cursor: pointer; padding: 0 2px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s;
}
.tx-del:hover { opacity: 1; }
.tx-meta { font-size: 11px; color: var(--text2); line-height: 1.4; }

.tx-add-form {
  background: var(--bg); border-radius: 8px; padding: 12px; margin-top: 8px;
}
.tx-add-form .s-field { border-bottom-color: #1C1C1E; padding: 6px 0; }
.tx-add-form .s-field label { font-size: 12px; color: var(--text2); }
.tx-add-form .s-field input { width: 120px; font-size: 12px; }
.tx-add-form .s-field select { font-size: 12px; }

.tx-recurrence-fields { margin-top: 4px; }

.add-btn {
  background: var(--income); border: none; color: #fff; font-size: 12px; font-weight: 600;
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-family: var(--font);
  margin-top: 8px; width: 100%;
}
.add-btn:hover { opacity: 0.85; }

.seed-warning { font-size: 11px; color: var(--expense); margin-top: 4px; }
.seed-info { font-size: 11px; color: var(--text2); margin-top: 4px; }

.gear-btn {
  position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: background 0.15s, opacity 0.2s;
}
.gear-btn:hover { background: #2C2C2E; color: var(--text); }
body.settings-open .gear-btn { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="app">
  <div class="cal-header">
    <h1 id="monthTitle"></h1>
    <div class="cal-nav">
      <button class="today-btn" onclick="goToday()">Today</button>
      <button onclick="navMonth(-1)">&#8249;</button>
      <button onclick="navMonth(1)">&#8250;</button>
    </div>
  </div>
  <div class="dow-row">
    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
  </div>
  <div class="cal-grid-wrap">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<button class="gear-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Settings</h2>
    <button class="sidebar-close" onclick="toggleSettings()">&times;</button>
  </div>
  <div class="sidebar-scroll" id="sidebarContent"></div>
</div>

<script>
// --- Data ---
function load(key) {
  try { return JSON.parse(localStorage.getItem('fc_' + key)); } catch { return null; }
}
function save(key, val) { localStorage.setItem('fc_' + key, JSON.stringify(val)); }

let settings = load('settings') || {
  checkingBalance: 0, savingsBalance: 0, showSavings: false,
  rent: { amount: 0, dayOfMonth: 1 },
  paycheck: { amount: 0, seedDate: '' }
};

let creditCards = load('creditCards') || [
  { id: 'amex', name: 'Amex', months: {} },
  { id: 'apple', name: 'Apple', months: {} },
  { id: 'chase', name: 'Chase', months: {} }
];

// Migrate old adHocIncome → transactions
let transactions = load('transactions');
if (!transactions) {
  const oldAdhoc = load('adHocIncome') || [];
  transactions = oldAdhoc.map(ah => ({
    id: ah.id, label: ah.label, amount: ah.amount,
    source: 'external', target: 'checking',
    date: ah.date, recurrence: 'none', dayOfMonth: 1, intervalDays: 14
  }));
}

function persist() {
  save('settings', settings);
  save('creditCards', creditCards);
  save('transactions', transactions);
}

// --- Date helpers ---
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
const ACCT_LABELS = { external: 'External', checking: 'Checking', savings: 'Savings' };

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function dateKey(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmt(n) {
  const neg = n < 0;
  const abs = Math.abs(Math.round(n));
  return (neg ? '-' : '') + '$' + abs.toLocaleString('en-US');
}

// --- Paycheck: every other Thursday ---
function isPayday(y, m, d) {
  if (!settings.paycheck.seedDate || !settings.paycheck.amount) return false;
  const seed = parseDate(settings.paycheck.seedDate);
  const seedUTC = Date.UTC(seed.getFullYear(), seed.getMonth(), seed.getDate());
  const targetUTC = Date.UTC(y, m, d);
  const diffDays = Math.round((targetUTC - seedUTC) / 86400000);
  return diffDays % 14 === 0;
}

function seedIsThursday() {
  if (!settings.paycheck.seedDate) return true;
  return parseDate(settings.paycheck.seedDate).getDay() === 4;
}

function nextPayday() {
  if (!settings.paycheck.seedDate) return null;
  const seed = parseDate(settings.paycheck.seedDate);
  const seedUTC = Date.UTC(seed.getFullYear(), seed.getMonth(), seed.getDate());
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.round((todayUTC - seedUTC) / 86400000);
  const periods = Math.ceil(diffDays / 14);
  return new Date(seedUTC + periods * 14 * 86400000);
}

// --- Transaction recurrence ---
function txOccursOn(tx, dk, y, m, d) {
  if (!tx.date) return false;
  if (tx.recurrence === 'none') {
    return tx.date === dk;
  }
  if (tx.recurrence === 'monthly') {
    if (d !== tx.dayOfMonth) return false;
    // Must be on or after the start month
    return dk.substring(0, 7) >= tx.date.substring(0, 7);
  }
  if (tx.recurrence === 'interval') {
    const start = parseDate(tx.date);
    const startUTC = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
    const targetUTC = Date.UTC(y, m, d);
    const diff = Math.round((targetUTC - startUTC) / 86400000);
    return diff >= 0 && diff % tx.intervalDays === 0;
  }
  return false;
}

// Classify a transaction for display
function txPillClass(tx) {
  if (tx.source !== 'external' && tx.target !== 'external') return 'pill-transfer';
  if (tx.target === 'checking' || tx.target === 'savings') return 'pill-income';
  return 'pill-expense';
}

// --- Event computation ---
function getEventsForDay(y, m, d) {
  const events = [];
  const dk = dateKey(y, m, d);

  // Paycheck (biweekly Thursday) — always external → checking
  if (isPayday(y, m, d)) {
    events.push({
      type: 'paycheck', label: 'Paycheck', amount: settings.paycheck.amount,
      source: 'external', target: 'checking', pillClass: 'pill-income'
    });
  }

  // Rent — always checking → external
  if (settings.rent.amount && settings.rent.dayOfMonth === d) {
    events.push({
      type: 'rent', label: 'Rent', amount: settings.rent.amount,
      source: 'checking', target: 'external', pillClass: 'pill-expense'
    });
  }

  // Credit cards — always checking → external
  const mk = `${y}-${String(m + 1).padStart(2, '0')}`;
  for (const cc of creditCards) {
    const mdata = cc.months[mk];
    if (mdata && mdata.dueDate && mdata.amount) {
      const dueDay = parseInt(mdata.dueDate.split('-')[2], 10);
      if (dueDay === d) {
        events.push({
          type: 'cc', label: cc.name, amount: mdata.amount,
          source: 'checking', target: 'external', pillClass: 'pill-expense'
        });
      }
    }
  }

  // Transactions
  for (const tx of transactions) {
    if (txOccursOn(tx, dk, y, m, d)) {
      events.push({
        type: 'tx', label: tx.label, amount: tx.amount,
        source: tx.source, target: tx.target, pillClass: txPillClass(tx)
      });
    }
  }

  return events;
}

// --- Balance computation ---
// Every event has source + target. We compute net effect on checking and savings.
function eventNetChecking(e) {
  let net = 0;
  if (e.target === 'checking') net += e.amount;
  if (e.source === 'checking') net -= e.amount;
  return net;
}

function eventNetSavings(e) {
  let net = 0;
  if (e.target === 'savings') net += e.amount;
  if (e.source === 'savings') net -= e.amount;
  return net;
}

function computeBalances() {
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const dim = daysInMonth(viewYear, viewMonth);
  const totalCells = firstDow + dim;
  const rowCount = totalCells <= 35 ? 5 : 6;

  const startDate = new Date(viewYear, viewMonth, 1 - firstDow);
  const endDate = new Date(viewYear, viewMonth, 1 - firstDow + rowCount * 7 - 1);
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  const days = [];
  let cur = new Date(startDate);
  while (cur <= endDate) {
    const y = cur.getFullYear(), m = cur.getMonth(), d = cur.getDate();
    const dk = dateKey(y, m, d);
    const events = getEventsForDay(y, m, d);
    const netChecking = events.reduce((s, e) => s + eventNetChecking(e), 0);
    const netSavings = events.reduce((s, e) => s + eventNetSavings(e), 0);
    days.push({ dk, events, netChecking, netSavings });
    cur.setDate(cur.getDate() + 1);
  }

  // Cumulative before today
  let cumCheckingBefore = 0, cumSavingsBefore = 0;
  for (const day of days) {
    if (day.dk >= todayKey) break;
    cumCheckingBefore += day.netChecking;
    cumSavingsBefore += day.netSavings;
  }

  const results = {};
  let cumC = 0, cumS = 0;
  for (const day of days) {
    cumC += day.netChecking;
    cumS += day.netSavings;
    results[day.dk] = {
      checking: settings.checkingBalance + cumC - cumCheckingBefore,
      savings: settings.savingsBalance + cumS - cumSavingsBefore,
      events: day.events
    };
  }

  return results;
}

// --- Render calendar ---
function render() {
  document.getElementById('monthTitle').textContent =
    `${MONTH_NAMES[viewMonth]} ${viewYear}`;

  const grid = document.getElementById('calGrid');
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const dim = daysInMonth(viewYear, viewMonth);
  const prevDim = daysInMonth(viewYear, viewMonth - 1);

  const balances = computeBalances();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let html = '';

  for (let i = 0; i < firstDow; i++) {
    const d = prevDim - firstDow + 1 + i;
    const pm = viewMonth === 0 ? 11 : viewMonth - 1;
    const py = viewMonth === 0 ? viewYear - 1 : viewYear;
    const dk = dateKey(py, pm, d);
    html += renderCell(d, dk, balances[dk], true, false);
  }

  for (let d = 1; d <= dim; d++) {
    const dk = dateKey(viewYear, viewMonth, d);
    html += renderCell(d, dk, balances[dk], false, dk === todayKey);
  }

  const totalCells = firstDow + dim;
  const rows = totalCells <= 35 ? 5 : 6;
  const remaining = rows * 7 - totalCells;
  for (let i = 1; i <= remaining; i++) {
    const nm = viewMonth === 11 ? 0 : viewMonth + 1;
    const ny = viewMonth === 11 ? viewYear + 1 : viewYear;
    const dk = dateKey(ny, nm, i);
    html += renderCell(i, dk, balances[dk], true, false);
  }

  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  grid.innerHTML = html;
}

function renderCell(d, dk, data, otherMonth, isToday) {
  const cls = ['day-cell'];
  if (otherMonth) cls.push('other-month');
  if (isToday) cls.push('today');

  let inner = `<div class="day-num">${d}</div>`;

  if (data) {
    const balCls = data.checking < 0 ? ' negative' : '';
    inner += `<div class="day-balance${balCls}">${fmt(data.checking)}</div>`;

    if (settings.showSavings) {
      const savCls = data.savings < 0 ? ' negative' : '';
      inner += `<div class="day-savings${savCls}">${fmt(data.savings)}</div>`;
    }

    if (data.events.length > 0) {
      inner += '<div class="day-events">';
      for (const e of data.events) {
        const sign = e.source === 'external' ? '+' : (e.target === 'external' ? '-' : '');
        const display = sign ? `${sign}${fmt(e.amount)}` : fmt(e.amount);
        inner += `<div class="event-pill ${e.pillClass}">${e.label} ${display}</div>`;
      }
      inner += '</div>';
    }
  }

  return `<div class="${cls.join(' ')}">${inner}</div>`;
}

// --- Navigation ---
function navMonth(dir) {
  const grid = document.getElementById('calGrid');
  grid.classList.add('fade-out');
  setTimeout(() => {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
    if (settingsOpen) renderSettings();
    grid.classList.remove('fade-out');
  }, 150);
}

function goToday() {
  const grid = document.getElementById('calGrid');
  grid.classList.add('fade-out');
  setTimeout(() => {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    render();
    if (settingsOpen) renderSettings();
    grid.classList.remove('fade-out');
  }, 150);
}

// --- Settings ---
let settingsOpen = false;
let expandedTxId = null;
let expandedCcId = null;

function toggleTxExpand(id, e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  expandedTxId = expandedTxId === id ? null : id;
  renderSettings();
}

function toggleCcExpand(id, e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  expandedCcId = expandedCcId === id ? null : id;
  renderSettings();
}

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.body.classList.toggle('settings-open', settingsOpen);
  document.getElementById('sidebar').classList.toggle('open', settingsOpen);
  if (settingsOpen) renderSettings();
}

function renderSettings() {
  const mk = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;
  const monthLabel = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
  let html = '';

  // Accounts
  html += `<div class="s-section">
    <h3>Accounts</h3>
    <div class="s-field">
      <label>Checking Balance</label>
      <input type="number" value="${settings.checkingBalance || ''}" placeholder="0" onchange="updateSetting('checkingBalance', this.value)">
    </div>
    <div class="s-field">
      <label>Savings Balance</label>
      <input type="number" value="${settings.savingsBalance || ''}" placeholder="0" onchange="updateSetting('savingsBalance', this.value)">
    </div>
    <div class="s-field">
      <label>Show Savings</label>
      <label class="toggle">
        <input type="checkbox" ${settings.showSavings ? 'checked' : ''} onchange="updateSetting('showSavings', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
  </div>`;

  // Recurring
  let seedExtra = '';
  if (settings.paycheck.seedDate) {
    if (!seedIsThursday()) {
      const dayName = DAY_NAMES[parseDate(settings.paycheck.seedDate).getDay()];
      seedExtra = `<div class="seed-warning">That's a ${dayName}, not a Thursday. Pick a Thursday payday.</div>`;
    } else {
      const np = nextPayday();
      if (np) {
        seedExtra = `<div class="seed-info">Next payday: ${MONTH_NAMES[np.getUTCMonth()]} ${np.getUTCDate()}</div>`;
      }
    }
  }

  html += `<div class="s-section">
    <h3>Recurring</h3>
    <div class="s-field">
      <label>Rent</label>
      <input type="number" value="${settings.rent.amount || ''}" placeholder="Amount" onchange="updateRent('amount', this.value)">
    </div>
    <div class="s-field">
      <label>Rent Due Day</label>
      <input type="number" min="1" max="28" value="${settings.rent.dayOfMonth || ''}" placeholder="1" onchange="updateRent('dayOfMonth', this.value)">
    </div>
    <div class="s-field">
      <label>Paycheck</label>
      <input type="number" value="${settings.paycheck.amount || ''}" placeholder="Amount" onchange="updatePaycheck('amount', this.value)">
    </div>
    <div class="s-field">
      <label>Last Payday</label>
      <input type="date" value="${settings.paycheck.seedDate || ''}" onchange="updatePaycheck('seedDate', this.value)">
    </div>
    ${seedExtra}
  </div>`;

  // Credit Cards
  html += `<div class="s-section">
    <h3>Credit Cards &mdash; ${monthLabel}</h3>`;
  for (const cc of creditCards) {
    const mdata = cc.months[mk] || {};
    const ccOpen = expandedCcId === cc.id;
    const hasData = mdata.amount || mdata.dueDate;
    const summary = hasData ? `${fmt(mdata.amount || 0)} &middot; due ${mdata.dueDate || '—'}` : 'Not set';

    html += `<div class="cc-block${ccOpen ? ' expanded' : ''}" onclick="toggleCcExpand('${cc.id}', event)">
      <div class="cc-summary">
        <span class="cc-block-label">${cc.name}</span>
        <span class="cc-summary-detail">${summary}</span>
      </div>`;

    if (ccOpen) {
      html += `<div class="cc-edit" onclick="event.stopPropagation()">
        <div class="s-field">
          <label>Card Name</label>
          <input type="text" value="${cc.name}" style="text-align:left;width:140px" onchange="updateCCName('${cc.id}',this.value)">
        </div>
        <div class="s-field">
          <label>Balance</label>
          <input type="number" value="${mdata.amount || ''}" placeholder="0" onchange="updateCC('${cc.id}','${mk}','amount',this.value)">
        </div>
        <div class="s-field">
          <label>Due</label>
          <input type="date" value="${mdata.dueDate || ''}" onchange="updateCC('${cc.id}','${mk}','dueDate',this.value)">
        </div>
      </div>`;
    }

    html += `</div>`;
  }
  html += `</div>`;

  // Transactions
  html += `<div class="s-section">
    <h3>Transactions</h3>`;

  for (const tx of transactions) {
    const flowLabel = `${ACCT_LABELS[tx.source]} → ${ACCT_LABELS[tx.target]}`;
    let recLabel = 'One-time';
    if (tx.recurrence === 'monthly') recLabel = `Monthly on the ${ordinal(tx.dayOfMonth)}`;
    if (tx.recurrence === 'interval') recLabel = `Every ${tx.intervalDays} days`;

    const amtClass = tx.source === 'external' ? 'income' :
      tx.target === 'external' ? 'expense' : 'transfer';

    const isOpen = expandedTxId === tx.id;
    const sel = (field, val) => val === field ? ' selected' : '';

    // Collapsed view
    html += `<div class="tx-item${isOpen ? ' expanded' : ''}" onclick="toggleTxExpand('${tx.id}', event)">
      <div class="tx-header">
        <span class="tx-label">${tx.label}</span>
        <span class="tx-amount ${amtClass}">${fmt(tx.amount)}</span>
        <button class="tx-del" onclick="event.stopPropagation();deleteTx('${tx.id}')">&times;</button>
      </div>
      <div class="tx-meta">${flowLabel} &middot; ${recLabel}${tx.recurrence === 'none' ? ' &middot; ' + tx.date : ''}</div>`;

    // Expanded edit fields
    if (isOpen) {
      let recFields = '';
      if (tx.recurrence === 'monthly') {
        recFields = `<div class="s-field">
          <label>Day of Month</label>
          <input type="number" min="1" max="28" value="${tx.dayOfMonth}" style="width:70px" onclick="event.stopPropagation()" onchange="updateTx('${tx.id}','dayOfMonth',this.value)">
        </div>`;
      } else if (tx.recurrence === 'interval') {
        recFields = `<div class="s-field">
          <label>Every __ days</label>
          <input type="number" min="1" value="${tx.intervalDays}" style="width:70px" onclick="event.stopPropagation()" onchange="updateTx('${tx.id}','intervalDays',this.value)">
        </div>`;
      }

      html += `<div class="tx-edit" onclick="event.stopPropagation()">
        <div class="s-field">
          <label>Label</label>
          <input type="text" value="${tx.label}" style="text-align:left;width:160px" onchange="updateTx('${tx.id}','label',this.value)">
        </div>
        <div class="s-field">
          <label>Amount</label>
          <input type="number" value="${tx.amount}" style="width:100px" onchange="updateTx('${tx.id}','amount',this.value)">
        </div>
        <div class="s-field">
          <label>From</label>
          <select onchange="updateTx('${tx.id}','source',this.value)">
            <option value="external"${sel('external',tx.source)}>External</option>
            <option value="checking"${sel('checking',tx.source)}>Checking</option>
            <option value="savings"${sel('savings',tx.source)}>Savings</option>
          </select>
        </div>
        <div class="s-field">
          <label>To</label>
          <select onchange="updateTx('${tx.id}','target',this.value)">
            <option value="checking"${sel('checking',tx.target)}>Checking</option>
            <option value="external"${sel('external',tx.target)}>External</option>
            <option value="savings"${sel('savings',tx.target)}>Savings</option>
          </select>
        </div>
        <div class="s-field">
          <label>Repeats</label>
          <select onchange="updateTx('${tx.id}','recurrence',this.value)">
            <option value="none"${sel('none',tx.recurrence)}>Does not repeat</option>
            <option value="monthly"${sel('monthly',tx.recurrence)}>Monthly</option>
            <option value="interval"${sel('interval',tx.recurrence)}>Every N days</option>
          </select>
        </div>
        ${recFields}
        <div class="s-field">
          <label>${tx.recurrence === 'none' ? 'Date' : 'Starting'}</label>
          <input type="date" value="${tx.date}" onchange="updateTx('${tx.id}','date',this.value)">
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  // Add form
  html += `<div class="tx-add-form" id="txForm">
    <div class="s-field">
      <label>Label</label>
      <input type="text" id="tx_label" placeholder="e.g. Birthday gift" style="text-align:left;width:160px">
    </div>
    <div class="s-field">
      <label>Amount</label>
      <input type="number" id="tx_amount" placeholder="0" style="width:100px">
    </div>
    <div class="s-field">
      <label>From</label>
      <select id="tx_source">
        <option value="external">External</option>
        <option value="checking">Checking</option>
        <option value="savings">Savings</option>
      </select>
    </div>
    <div class="s-field">
      <label>To</label>
      <select id="tx_target">
        <option value="checking" selected>Checking</option>
        <option value="external">External</option>
        <option value="savings">Savings</option>
      </select>
    </div>
    <div class="s-field">
      <label>Repeats</label>
      <select id="tx_recurrence" onchange="txRecurrenceChanged()">
        <option value="none">Does not repeat</option>
        <option value="monthly">Monthly</option>
        <option value="interval">Every N days</option>
      </select>
    </div>
    <div id="tx_rec_fields"></div>
    <div class="s-field">
      <label id="tx_date_label">Date</label>
      <input type="date" id="tx_date">
    </div>
    <button class="add-btn" onclick="addTx()">Add Transaction</button>
  </div>`;

  html += `</div>`;

  document.getElementById('sidebarContent').innerHTML = html;
}

function txRecurrenceChanged() {
  const rec = document.getElementById('tx_recurrence').value;
  const container = document.getElementById('tx_rec_fields');
  const dateLabel = document.getElementById('tx_date_label');

  if (rec === 'monthly') {
    container.innerHTML = `<div class="s-field">
      <label>Day of Month</label>
      <input type="number" id="tx_dayOfMonth" min="1" max="28" placeholder="1" style="width:70px">
    </div>`;
    dateLabel.textContent = 'Starting';
  } else if (rec === 'interval') {
    container.innerHTML = `<div class="s-field">
      <label>Every __ days</label>
      <input type="number" id="tx_intervalDays" min="1" placeholder="14" style="width:70px">
    </div>`;
    dateLabel.textContent = 'Starting';
  } else {
    container.innerHTML = '';
    dateLabel.textContent = 'Date';
  }
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// --- Updaters ---
function updateSetting(key, val) {
  if (key === 'showSavings') settings[key] = val;
  else settings[key] = parseFloat(val) || 0;
  persist(); render();
}

function updateRent(key, val) {
  settings.rent[key] = key === 'dayOfMonth' ? (parseInt(val) || 1) : (parseFloat(val) || 0);
  persist(); render();
}

function updatePaycheck(key, val) {
  if (key === 'seedDate') settings.paycheck.seedDate = val;
  else settings.paycheck.amount = parseFloat(val) || 0;
  persist(); render(); renderSettings();
}

function updateCCName(id, val) {
  const cc = creditCards.find(c => c.id === id);
  cc.name = val.trim() || cc.name;
  persist(); render();
}

function updateCC(id, mk, field, val) {
  const cc = creditCards.find(c => c.id === id);
  if (!cc.months[mk]) cc.months[mk] = {};
  if (field === 'dueDate') cc.months[mk].dueDate = val;
  else cc.months[mk].amount = parseFloat(val) || 0;
  persist(); render();
}

function addTx() {
  const label = document.getElementById('tx_label').value.trim();
  const amount = parseFloat(document.getElementById('tx_amount').value);
  const source = document.getElementById('tx_source').value;
  const target = document.getElementById('tx_target').value;
  const recurrence = document.getElementById('tx_recurrence').value;
  const date = document.getElementById('tx_date').value;

  // Validation with visible feedback
  const err = document.getElementById('tx_error');
  if (err) err.remove();

  if (!label || !amount || !date) {
    showTxError('Fill in label, amount, and date.');
    return;
  }
  if (source === target) {
    showTxError('Source and destination must be different.');
    return;
  }

  const tx = {
    id: Date.now().toString(36), label, amount, source, target, date, recurrence,
    dayOfMonth: 1, intervalDays: 14
  };

  if (recurrence === 'monthly') {
    const dom = document.getElementById('tx_dayOfMonth');
    tx.dayOfMonth = parseInt(dom?.value) || 1;
  }
  if (recurrence === 'interval') {
    const intv = document.getElementById('tx_intervalDays');
    tx.intervalDays = parseInt(intv?.value) || 14;
  }

  transactions.push(tx);

  // Remember scroll position, re-render, then scroll to show the new tile
  const scrollEl = document.querySelector('.sidebar-scroll');
  persist();
  render();
  renderSettings();

  // Scroll the last tx-item into view
  const items = document.querySelectorAll('.tx-item');
  if (items.length) {
    items[items.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function showTxError(msg) {
  const form = document.getElementById('txForm');
  if (!form) return;
  const el = document.createElement('div');
  el.id = 'tx_error';
  el.style.cssText = 'font-size:11px;color:#CC5555;padding:4px 0 0;';
  el.textContent = msg;
  form.querySelector('.add-btn').insertAdjacentElement('beforebegin', el);
}

function updateTx(id, field, val) {
  const tx = transactions.find(t => t.id === id);
  if (!tx) return;
  if (field === 'amount') tx.amount = parseFloat(val) || 0;
  else if (field === 'dayOfMonth') tx.dayOfMonth = parseInt(val) || 1;
  else if (field === 'intervalDays') tx.intervalDays = parseInt(val) || 14;
  else if (field === 'recurrence') {
    tx.recurrence = val;
    persist(); render(); renderSettings(); return;
  }
  else tx[field] = val;
  persist(); render();
}

function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  persist(); render(); renderSettings();
}

// --- Init ---
render();
if (!load('settings')) toggleSettings();
</script>
</body>
</html>
